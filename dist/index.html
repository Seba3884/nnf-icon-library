<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NNF Icon Library</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #283039;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #4493f8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  header {
    padding: 32px 24px 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { margin: 0 0 4px; font-size: 24px; }
  p.sub { margin: 0; color: var(--muted); }
  .controls {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    z-index: 5;
  }
  input[type="search"] {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    font-size: 15px;
  }
  input[type="range"] { accent-color: var(--accent); }
  .controls label { color: var(--muted); display: flex; align-items: center; gap: 8px; }
  #count { color: var(--muted); font-variant-numeric: tabular-nums; }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  .cell {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 10px;
    padding: 18px 8px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
  }
  .cell:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cell svg { color: var(--fg); }
  .cell .name {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }
  .cell.copied { border-color: #3fb950; }
  .cell.copied .name { color: #3fb950; }
  footer { text-align: center; color: var(--muted); padding: 24px; font-size: 13px; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>NNF Icon Library</h1>
    <p class="sub">Click any icon to copy its <code>&lt;svg&gt;</code> markup.</p>
  </header>

  <div class="controls">
    <input id="q" type="search" placeholder="Search icons…" autocomplete="off" />
    <label>Size
      <input id="size" type="range" min="16" max="64" value="28" />
    </label>
    <span id="count"></span>
  </div>

  <main id="grid"></main>
  <footer>Loaded from <code>dist/icons.json</code> · <span id="total"></span> icons</footer>

<script type="module">
  const grid = document.getElementById('grid');
  const q = document.getElementById('q');
  const sizeInput = document.getElementById('size');
  const count = document.getElementById('count');

  let icons = [];
  try {
    icons = await fetch('./icons.json').then((r) => r.json());
  } catch (e) {
    grid.innerHTML =
      '<p>Could not load <code>../dist/icons.json</code>. Run <code>npm run build</code> first, then serve this folder over HTTP.</p>';
  }
  document.getElementById('total').textContent = icons.length;

  function sized(svg, px) {
    return svg.replace('<svg ', `<svg width="${px}" height="${px}" `);
  }

  function render() {
    const term = q.value.trim().toLowerCase();
    const px = +sizeInput.value;
    const shown = icons.filter((i) => i.name.includes(term));
    count.textContent = `${shown.length} / ${icons.length}`;
    grid.innerHTML = shown
      .map(
        (i) =>
          `<div class="cell" data-name="${i.name}" title="Copy markup for ${i.name}">` +
          sized(i.svg, px) +
          `<div class="name">${i.name}</div></div>`
      )
      .join('');
  }

  grid.addEventListener('click', async (e) => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const icon = icons.find((i) => i.name === cell.dataset.name);
    try {
      await navigator.clipboard.writeText(icon.svg);
      cell.classList.add('copied');
      setTimeout(() => cell.classList.remove('copied'), 900);
    } catch {
      /* clipboard may be unavailable on file:// */
    }
  });

  q.addEventListener('input', render);
  sizeInput.addEventListener('input', render);
  render();
</script>
</body>
</html>
