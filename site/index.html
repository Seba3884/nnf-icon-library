document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"M8.5 12.5C5 15 7 19 7 19L10 17\" stroke=\"#2355C8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M15.9312 12.5C19.4312 15 17.4312 19 17.4312 19L14.4312 17\" stroke=\"#2355C8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M12 11C10.8954 11 10 10.1046 10 9C10 7.89543 10.8954 7 12 7C13.1046 7 14 7.89543 14 9C14 10.1046 13.1046 11 12 11Z\" stroke=\"#2355C8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>` },\n    { category: \"strategy-business\", name: \"workflow\", inner: `<rect x=\"3\" y=\"4\" width=\"6\" height=\"5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"4\" width=\"6\" height=\"5\" rx=\"1\"><\u002Frect><rect x=\"9\" y=\"15\" width=\"6\" height=\"5\" rx=\"1\"><\u002Frect><path d=\"M9 6.5 H15\"><\u002Fpath><path d=\"M6 9 V12 C6 13 6.5 13.5 7.5 13.5 H12 V15\"><\u002Fpath><path d=\"M18 9 V12 C18 13 17.5 13.5 16.5 13.5 H12\"><\u002Fpath>` },\n  ];\n\n  CAT_LABELS = {\n    \"strategy-business\": \"Strategy & Business\",\n    \"science-medical\": \"Science & Medical\",\n    \"educational\": \"Educational\",\n    \"social-humanitarian\": \"Social & Humanitarian\",\n    \"department\": \"Department\",\n    \"communication\": \"Communication\",\n  };\n\n  TREATMENTS = [\n    { key: \"blue\",         label: \"Blue\",     stroke: \"#2355C8\", fill: null,      dark: false, bg: \"#F0F0EB\", swatchBg: \"#F4F3EF\" },\n    { key: \"blue-circle\",  label: \"Blue ●\",   stroke: \"#FFFFFF\", fill: \"#2355C8\", dark: false, bg: \"#F0F0EB\", swatchBg: \"#F4F3EF\" },\n    { key: \"white\",        label: \"White\",    stroke: \"#FFFFFF\", fill: null,      dark: true,  bg: \"#413C41\", swatchBg: \"#413C41\" },\n    { key: \"white-circle\", label: \"White ●\",  stroke: \"#2355C8\", fill: \"#FFFFFF\", dark: false, bg: \"#F0F0EB\", swatchBg: \"#F0F0EB\" },\n  ];\n\n  componentDidMount() {\n    this._onKey = (e) => { if (e.key === \"Escape\") this.setState({ selected: null }); };\n    window.addEventListener(\"keydown\", this._onKey);\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"keydown\", this._onKey);\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n  }\n\n  prettyName(name) { return name.replace(/-/g, \" \").replace(/^./, c => c.toUpperCase()); }\n  catLabel(cat) { return this.CAT_LABELS[cat] || cat.replace(/[-_]/g, \" \").replace(/\\b\\w/g, c => c.toUpperCase()); }\n  treatmentLabel(t) { return t.label.replace(\" ●\", \" circle\"); }\n\n  svgMarkup(inner, t) {\n    const circle = t.fill ? `<circle cx=\"20\" cy=\"20\" r=\"16.9706\" fill=\"${t.fill}\"><\u002Fcircle>` : \"\";\n    const g = `<g transform=\"translate(8,8)\" stroke=\"${t.stroke}\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">${inner}<\u002Fg>`;\n    return { html: circle + g, full: `<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\">${circle}${g}<\u002Fsvg>` };\n  }\n  node(inner, t) {\n    return React.createElement(\"svg\", { width: \"100%\", height: \"100%\", viewBox: \"0 0 40 40\", fill: \"none\", dangerouslySetInnerHTML: { __html: this.svgMarkup(inner, t).html } });\n  }\n\n  triggerDownload(filename, svgString) {\n    const blob = new Blob([svgString], { type: \"image/svg+xml\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = filename;\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n  showToast(msg) {\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState({ toast: msg });\n    this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n\n  renderVals() {\n    const q = this.state.query.trim().toLowerCase();\n    const cat = this.state.cat;\n    const blueT = this.TREATMENTS[0];\n\n    const cats = {};\n    this.ICONS.forEach(ic => { cats[ic.category] = (cats[ic.category] || 0) + 1; });\n    const catIds = Object.keys(cats).sort();\n\n    const chipStyle = (active) =>\n      `display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 14px;border-radius:999px;font-family:'Novo Vertikal',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:all 140ms cubic-bezier(0.2,0,0,1);` +\n      (active ? `background:#2355C8;color:#FFFFFF;border:1px solid #2355C8;` : `background:#FFFFFF;color:#141419;border:1px solid #E1DCD7;`);\n    const countStyle = (active) => `font-size:11px;font-variant-numeric:tabular-nums;color:${active ? \"rgba(255,255,255,0.7)\" : \"rgba(20,20,25,0.4)\"};`;\n\n    const categories = [\n      { id: \"all\", label: \"All icons\", count: this.ICONS.length },\n      ...catIds.map(id => ({ id, label: this.catLabel(id), count: cats[id] })),\n    ].map(c => {\n      const active = cat === c.id;\n      return { label: c.label, count: c.count, style: chipStyle(active), countStyle: countStyle(active), onClick: () => this.setState({ cat: c.id }) };\n    });\n\n    const matches = this.ICONS.map((ic, i) => ({ ic, i })).filter(({ ic }) => {\n      if (cat !== \"all\" && ic.category !== cat) return false;\n      if (!q) return true;\n      return (ic.name + \" \" + this.catLabel(ic.category)).toLowerCase().includes(q);\n    });\n\n    const filtered = matches.map(({ ic, i }) => ({\n      label: this.prettyName(ic.name),\n      categoryLabel: this.catLabel(ic.category),\n      node: this.node(ic.inner, blueT),\n      onOpen: () => this.setState({ selected: i, treatment: \"blue\" }),\n    }));\n\n    const hasResults = filtered.length > 0;\n    const resultLabel = matches.length === this.ICONS.length ? `${this.ICONS.length} icons` : `${matches.length} of ${this.ICONS.length}`;\n\n    // Modal\n    const sel = this.state.selected;\n    const modalOpen = sel !== null && sel !== undefined;\n    let modalVals = { modalOpen: false, mCategory: \"\", mLabel: \"\", mPreviewNode: null, mPreviewBg: \"\", mTreatments: [], mFilename: \"\", onDownload: () => {}, onDownloadAll: () => {} };\n    if (modalOpen) {\n      const ic = this.ICONS[sel];\n      const curT = this.TREATMENTS.find(t => t.key === this.state.treatment) || blueT;\n      const label = this.prettyName(ic.name);\n      const previewBg = `border-radius:12px;display:flex;align-items:center;justify-content:center;padding:36px;background:${curT.bg};transition:background 200ms cubic-bezier(0.2,0,0,1);`;\n      const filename = `${ic.category}_${ic.name}_${curT.key}.svg`;\n\n      const mTreatments = this.TREATMENTS.map(t => {\n        const active = t.key === curT.key;\n        return {\n          label: t.label,\n          node: this.node(ic.inner, t),\n          style: `display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px 4px;border-radius:9px;cursor:pointer;background:transparent;border:1px solid ${active ? \"#2355C8\" : \"#ECE9E4\"};box-shadow:${active ? \"0 0 0 1px #2355C8 inset\" : \"none\"};transition:all 140ms cubic-bezier(0.2,0,0,1);`,\n          swatchStyle: `width:46px;height:46px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:${t.swatchBg};`,\n          labelStyle: `font-size:10px;letter-spacing:0.02em;text-transform:uppercase;color:${active ? \"#2355C8\" : \"rgba(20,20,25,0.5)\"};font-weight:${active ? \"600\" : \"400\"};`,\n          onClick: () => this.setState({ treatment: t.key }),\n        };\n      });\n\n      modalVals = {\n        modalOpen: true,\n        mCategory: this.catLabel(ic.category),\n        mLabel: label,\n        mPreviewNode: this.node(ic.inner, curT),\n        mPreviewBg: previewBg,\n        mTreatments,\n        mFilename: filename,\n        onDownload: () => {\n          this.triggerDownload(filename, this.svgMarkup(ic.inner, curT).full);\n          this.showToast(`${label} · ${this.treatmentLabel(curT)} downloaded`);\n        },\n        onDownloadAll: () => {\n          this.TREATMENTS.forEach((t, k) => {\n            setTimeout(() => this.triggerDownload(`${ic.category}_${ic.name}_${t.key}.svg`, this.svgMarkup(ic.inner, t).full), k * 180);\n          });\n          this.showToast(`${label} · all four treatments downloaded`);\n        },\n      };\n    }\n\n    return {\n      total: String(this.ICONS.length).padStart(2, \"0\"),\n      catCount: String(catIds.length).padStart(2, \"0\"),\n      query: this.state.query,\n      hasQuery: this.state.query.length > 0,\n      categories,\n      filtered,\n      hasResults,\n      noResults: !hasResults,\n      resultLabel,\n      toast: this.state.toast,\n      onSearch: (e) => this.setState({ query: e.target.value }),\n      clearSearch: () => this.setState({ query: \"\" }),\n      resetAll: () => this.setState({ query: \"\", cat: \"all\" }),\n      closeModal: () => this.setState({ selected: null }),\n      stopProp: (e) => e.stopPropagation(),\n      ...modalVals,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
