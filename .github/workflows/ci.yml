name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: npm run build
      - name: Verify dist is up to date
        run: git diff --exit-code -- dist || (echo "dist/ is out of date — run 'npm run build' and commit." && exit 1)
      - name: Test
        run: npm test
